<script>
  function initForm(config) {
    window.formConfig = config;
    const formErrorElement = document.getElementById('formError');

    config.fields.forEach(field => {
      const fieldElement = document.getElementById(field.name);
      const fieldErrorElement = document.getElementById(field.name + 'Error');

      if (config.initialData && config.initialData[field.name]) {
        let value = config.initialData[field.name];

        if (field.inputProps?.type === 'date' && value) {
          value = value.substring(0, 10); // YYYY-MM-DD
        }

        fieldElement.value = value ?? '';
      }

      fieldElement.addEventListener('input', () => {
        formErrorElement.style.display = 'none';
        fieldElement.classList.remove('invalid');
        if (fieldErrorElement) fieldErrorElement.style.display = 'none';
      });
    });

    const firstFieldElement = document.getElementById(config.fields[0].name);

    window.onload = () => firstFieldElement.focus();

    // when the focus switches outside the body to the modal dialog, there is an annoying blinking caret
    // prevent it by focusing the first input field whenever the form is blurred
    window.addEventListener('blur', () => {
      setTimeout(() => {
        firstFieldElement.focus();
      }, 0);
    });

    // submit on enter
    document.addEventListener(
      'keydown',
      e => {
        if (e.key === 'Enter') submitForm();
      }
    );
  }

  function getFormInputValues() {
    const data = {};
    window.formConfig.fields.forEach(field => {
      data[field.name] = document.getElementById(field.name).value.trim();
    });
    return data;
  }

  function validateRequiredFields(data) {
    let valid = true;

    formConfig.fields.forEach(field => {
      if (field.required && !data[field.name]) {
        showFieldError(field.name, 'Required', valid);
        valid = false;
      }
    });

    return valid;
  }

  function submitForm() {
    const values = getFormInputValues();
    if (!validateRequiredFields(values)) return;

    setLoading(true);

    google.script.run
      .withSuccessHandler(() => {
        setLoading(false);
        google.script.host.close();
      })
      .withFailureHandler(handleError)
      .saveItem({
          typeName: window.formConfig.typeName,
          values,
          rowNum: window.formConfig.rowNum
      });
  }

  function setLoading(isLoading) {
    if (isLoading) {
      document.body.classList.add('loading');
      document.querySelector('.submit').classList.add('loading');
    } else {
      document.body.classList.remove('loading');
      document.querySelector('.submit').classList.remove('loading');
    }
  }

  function handleError(errorStr) {
    setLoading(false);
    const error = parseError(errorStr);

    if (!error) {
      // error is not a JSON object - show it as a string
      showGlobalError(errorStr);
      return;
    }

    if (error.fieldName) {
      showFieldError(error.fieldName, error.message);
    } else {
      alert(error.message || error.code);
    }
  }

  function parseError(errorStr) {
    const match = errorStr.message.match(/\{.*}/);

    if (!match) return null;

    try {
      return JSON.parse(match[0]);
    } catch {
      return null;
    }
  }

  function showFieldError(fieldName, messageHtml, focus = true) {
    console.log('showFieldError', fieldName, messageHtml);
    const fieldElement = document.getElementById(fieldName);
    const errorElement = document.getElementById(fieldName + 'Error');

    errorElement.innerHTML = messageHtml;
    errorElement.style.display = 'block';

    fieldElement.classList.add('invalid');
    if (focus) fieldElement.focus();
  }

  function showGlobalError(message) {
    const formErrorElement = document.getElementById('formError');
    formErrorElement.innerHTML = message;
    formErrorElement.style.display = 'block';
  }
</script>
