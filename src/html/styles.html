<style>
    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        min-height: 100%;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 0;
        padding-top: 8px;
    }

    /* without this the fields width is more than the dialog width (because width: 100% but padding + border are added on top of that) */
    *, *::before, *::after {
        box-sizing: border-box;
    }

    h2 {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 600;
    }

    .field {
        position: relative;
        margin-bottom: 16px;
    }

    .field select.input {
        width: 100%;
        height: 48px;              /* match input */
        padding: 12px 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
        font-size: 14px;
        appearance: none;          /* removes native styling */
    }

    .field label {
        position: absolute;
        top: -8px;
        left: 10px;
        background: white;
        font-size: 12px;
        padding: 0 4px;
    }

    input {
        width: 100%;
        padding: 14px 12px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        background: white;
        outline: none;
        transition: all 0.2s;
    }

    label {
        position: absolute;
        left: 12px;
        top: 12px;
        font-size: 14px;
        color: #888;
        pointer-events: none;
        transition: all 0.2s;
        background: white;
        padding: 0 4px;
    }

    input:focus {
        border-color: #4c8bf5;
        box-shadow: 0 0 0 2px rgba(76, 139, 245, 0.15);
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
        top: -7px;
        font-size: 11px;
        color: #4c8bf5;
    }

    input.invalid {
        border-color: #d93025;
        box-shadow: 0 0 0 2px rgba(217, 48, 37, 0.15);
    }

    .error {
        color: #d93025;
        font-size: 11px;
        margin-top: 4px;
        display: none;
    }

    .actions {
        display: flex;
        gap: 8px;
        margin-top: 24px;
    }

    button {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        font-size: 14px;
        cursor: pointer;
    }

    .form-error {
        margin-top: 12px;
        color: #d93025;
        font-size: 13px;
        display: none;
    }

    .submit {
        background: #4c8bf5;
        color: white;
    }

    .submit:hover {
        background: #3a6fd8;
    }

    .cancel {
        background: #eee;
    }

    /* disable interactions */
    body.loading {
        pointer-events: none;
    }

    /* overlay */
    body.loading::after {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(255,255,255,0.6);
        z-index: 9999;
    }

    /* spinner */
    body.loading::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top-color: #333;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: spin 0.8s linear infinite;
        z-index: 10000;
    }

    @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }
</style>
