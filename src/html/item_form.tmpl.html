<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <?!= includeFile('html/styles'); ?>
</head>

<body>

<? for (const name in fields) {
     const field = fields[name];
     const inputProps = field.inputProps || {};
     const type = inputProps.type || 'text';
?>

<div class="field">

    <? if (type === 'select') { ?>

    <select id="<?= field.name ?>" class="input">
        <? for (const opt of inputProps.options || []) { ?>
        <option value="<?= opt.value ?>"><?= opt.label ?></option>
        <? } ?>
    </select>

    <? } else { ?>

    <input
            id="<?= field.name ?>"
            placeholder=" "
    <? for (const key in inputProps) {
           if (key === 'options') continue; ?>
    <?!= key ?>="<?!= inputProps[key] ?>"
    <? } ?>
    >

    <? } ?>

    <label><?= field.columnHeader ?><?= field.required ? ' *' : '' ?></label>
    <div id="<?= field.name ?>Error" class="error"></div>

</div>

<? } ?>

<div class="actions">
    <button class="cancel" onclick="google.script.host.close()">Cancel</button>
    <button class="submit" onclick="submitForm()">Save</button>
</div>

<div id="formError" class="form-error"></div>

<?!= includeFile('html/item_form.js'); ?>

<script>
  initForm({
    typeName: <?!= JSON.stringify(typeName) ?>,
    fields: <?!= JSON.stringify(fields) ?>,
    rowNum: Number(<?= rowNum ?>),
    initialData: <?!= JSON.stringify(initialData) ?>,
  });
</script>

</body>
</html>
